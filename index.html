<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>资管仪表盘</title>
<style>
  :root{
    --bg:#0e1117; --card:#171c26; --card2:#1e2533; --line:#2a3343;
    --txt:#e6e9ef; --mut:#8b97a8; --up:#2ec27e; --down:#ef5350;
    --accent:#5b8cff; --warn:#f0b429;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:15px;line-height:1.5;padding:0 0 40px}
  .wrap{max-width:680px;margin:0 auto;padding:14px}
  h1{font-size:18px;margin:6px 2px 2px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--mut);font-size:12px;margin:0 2px 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px}
  .card h2{font-size:13px;color:var(--mut);margin:0 0 10px;font-weight:600;
    letter-spacing:.5px;text-transform:uppercase}
  .big{font-size:34px;font-weight:700;letter-spacing:-1px}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .kv .item{background:var(--card2);border-radius:10px;padding:9px 11px}
  .kv .lbl{font-size:11px;color:var(--mut)}
  .kv .val{font-size:16px;font-weight:600;margin-top:2px}
  .up{color:var(--up)} .down{color:var(--down)} .mut{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:8px 4px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:11px}
  th:first-child,td:first-child{text-align:left}
  .name{font-weight:600}.code{color:var(--mut);font-size:11px}
  .bar-row{margin-bottom:9px}
  .bar-row .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar{height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:4px}
  .quad{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .quad .q{background:var(--card2);border-radius:10px;padding:10px}
  .quad .q .qn{font-size:11px;color:var(--mut);min-height:28px}
  .quad .q .qv{font-size:18px;font-weight:700;margin-top:4px}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
    background:var(--card2);color:var(--mut);margin-left:6px}
  .pill.ok{background:rgba(46,194,126,.15);color:var(--up)}
  .pill.warn{background:rgba(240,180,41,.15);color:var(--warn)}
  .ev{font-size:12px;padding:7px 0;border-bottom:1px solid var(--line);color:var(--mut)}
  .ev b{color:var(--txt)}
  .foot{text-align:center;color:var(--mut);font-size:11px;margin-top:18px}
  #err{display:none;background:rgba(239,83,80,.12);border:1px solid var(--down);
    color:var(--down);padding:12px;border-radius:10px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 资管仪表盘 <span id="regime" class="pill"></span></h1>
  <p class="sub" id="meta">加载中…</p>
  <div id="err"></div>
  <div id="app" style="display:none">

    <div class="card">
      <h2>总净值</h2>
      <div class="row">
        <div class="big" id="nav">—</div>
        <div style="text-align:right">
          <div id="dailyChg" style="font-size:18px;font-weight:700">—</div>
          <div class="mut" style="font-size:12px">今日</div>
        </div>
      </div>
      <div class="kv">
        <div class="item"><div class="lbl">累计收益</div><div class="val" id="cum">—</div></div>
        <div class="item"><div class="lbl">初始本金</div><div class="val" id="init">—</div></div>
        <div class="item"><div class="lbl">现金 / 占比</div><div class="val" id="cash">—</div></div>
        <div class="item"><div class="lbl">持仓市值</div><div class="val" id="mv">—</div></div>
      </div>
    </div>

    <div class="card">
      <h2>风险状态</h2>
      <div id="risk"></div>
    </div>

    <div class="card">
      <h2>大类暴露</h2>
      <div id="cat"></div>
    </div>

    <div class="card">
      <h2>四象限（全天候）</h2>
      <div class="quad" id="quad"></div>
    </div>

    <div class="card">
      <h2>持仓明细</h2>
      <table>
        <thead><tr><th>标的</th><th>市值</th><th>权重</th><th>浮盈%</th></tr></thead>
        <tbody id="hold"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>近期事件</h2>
      <div id="events"></div>
    </div>

    <div class="foot" id="foot"></div>
  </div>
</div>

<script>
const QUAD_NAMES={
  growth_up_inflation_down:"增长↑ 通胀↓",
  growth_up_inflation_up:"增长↑ 通胀↑",
  growth_down_inflation_down:"增长↓ 通胀↓",
  growth_down_inflation_up:"增长↓ 通胀↑"
};
const fmtMoney=n=>"¥"+Number(n).toLocaleString("zh-CN",{maximumFractionDigits:0});
const fmtPct=n=>(n>=0?"+":"")+Number(n).toFixed(2)+"%";
const cls=n=>n>0?"up":(n<0?"down":"mut");

function render(d){
  const h=d.header;
  document.getElementById("meta").textContent=
    "数据日期 "+h.latest_date+" · 生成于 "+(d.generated_at||"").replace("T"," ");
  // regime
  const rg=(d.recent_decisions&&d.recent_decisions[0]&&d.recent_decisions[0].regime_label)||"";
  const rgEl=document.getElementById("regime");
  if(rg){rgEl.textContent="市况:"+rg;}else{rgEl.style.display="none";}

  document.getElementById("nav").textContent=fmtMoney(h.total_nav);
  const dc=document.getElementById("dailyChg");
  dc.textContent=fmtMoney(h.daily_pnl)+" ("+fmtPct(h.daily_return_pct)+")";
  dc.className=cls(h.daily_pnl);
  const cum=document.getElementById("cum");
  cum.textContent=fmtPct(h.cum_return_pct); cum.className="val "+cls(h.cum_return_pct);
  document.getElementById("init").textContent=fmtMoney(h.init_capital);
  document.getElementById("cash").textContent=fmtMoney(h.cash)+" / "+h.cash_pct+"%";
  document.getElementById("mv").textContent=fmtMoney(h.market_value);

  // risk
  const r=d.risk_status||{}; const rl=[];
  const ddOk=r.drawdown_pct>-r.drawdown_soft_limit;
  rl.push(riskRow("回撤",r.drawdown_pct+"%","软线 -"+r.drawdown_soft_limit+"% / 硬线 -"+r.drawdown_hard_limit+"%",ddOk));
  rl.push(riskRow("最大单仓",r.max_position_pct+"%","上限 "+r.max_position_limit+"%",r.max_position_pct<=r.max_position_limit));
  rl.push(riskRow("现金缓冲",r.cash_buffer_pct+"%","下限 "+r.cash_buffer_limit+"%",r.cash_buffer_pct>=r.cash_buffer_limit));
  const warns=(r.warnings&&r.warnings.length)?("<div class='ev' style='color:var(--warn)'>⚠ "+r.warnings.join("；")+"</div>"):"";
  document.getElementById("risk").innerHTML=rl.join("")+warns;

  // category
  const cat=d.category_exposure||{};
  const maxc=Math.max(...Object.values(cat),1);
  document.getElementById("cat").innerHTML=Object.entries(cat)
    .sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="bar-row"><div class="top"><span>${k}</span><span>${v}%</span></div>
      <div class="bar"><i style="width:${(v/maxc*100).toFixed(0)}%"></i></div></div>`).join("");

  // quadrant
  const q=d.quadrant_exposure||{};
  document.getElementById("quad").innerHTML=Object.entries(q)
    .map(([k,v])=>`<div class="q"><div class="qn">${QUAD_NAMES[k]||k}</div><div class="qv">${v}%</div></div>`).join("");

  // holdings
  document.getElementById("hold").innerHTML=(d.holdings||[])
    .slice().sort((a,b)=>b.market_value-a.market_value)
    .map(x=>{const w=(x.market_value/h.total_nav*100).toFixed(1);
      return `<tr><td><div class="name">${x.name}</div><div class="code">${x.code}</div></td>
        <td>${fmtMoney(x.market_value)}</td><td>${w}%</td>
        <td class="${cls(x.unrealized_pnl_pct)}">${fmtPct(x.unrealized_pnl_pct)}</td></tr>`;}).join("");

  // events
  const ev=(d.recent_events||[]).slice(0,12);
  document.getElementById("events").innerHTML=ev.length?ev.map(e=>{
    const t=(e.ts||"").slice(0,10);
    return `<div class="ev"><b>${e.name||e.code}</b> · ${e.event_type} <span style="float:right">${t}</span></div>`;
  }).join(""):"<div class='ev'>暂无</div>";

  document.getElementById("foot").textContent="纸面模拟盘 · 无真实资金 · "+(d.universe_size||"")+" 标的池";
  document.getElementById("app").style.display="block";
}
function riskRow(label,val,note,ok){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)">
    <span>${label} <span class="pill ${ok?'ok':'warn'}">${ok?'正常':'注意'}</span></span>
    <span style="text-align:right"><b>${val}</b><br><span class="mut" style="font-size:11px">${note}</span></span></div>`;
}

fetch("dashboard.json?t="+Date.now())
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(render)
  .catch(e=>{
    document.getElementById("meta").style.display="none";
    const el=document.getElementById("err");
    el.style.display="block";
    el.textContent="无法加载数据：dashboard.json 还没推送，或当天系统未运行。("+e.message+")";
  });
</script>
</body>
</html>
