<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>资管系统 · 全景仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --card:#161b24; --card2:#1d2430; --line:#2a3340;
    --txt:#e6e9ef; --mut:#8b97a8; --up:#2ec27e; --down:#ef5350;
    --accent:#5b8cff; --warn:#f0b429; --gold:#d4a942;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:15px;line-height:1.55;padding-bottom:48px}
  .wrap{max-width:1080px;margin:0 auto;padding:18px}
  header.top{padding:6px 2px 2px}
  h1{font-size:22px;margin:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sub{color:var(--mut);font-size:12px;margin:4px 2px 0}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;
    background:var(--card2);color:var(--mut)}
  .pill.ok{background:rgba(46,194,126,.15);color:var(--up)}
  .pill.warn{background:rgba(240,180,41,.15);color:var(--warn)}
  .pill.paper{background:rgba(91,140,255,.15);color:var(--accent)}
  .section-label{font-size:12px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;
    margin:30px 2px 12px;border-left:3px solid var(--accent);padding-left:9px;font-weight:600}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:720px){.g2,.g3{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h2{font-size:13px;color:var(--mut);margin:0 0 12px;font-weight:600;letter-spacing:.5px}
  .big{font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .kv .item{background:var(--card2);border-radius:10px;padding:10px 12px}
  .kv .lbl{font-size:11px;color:var(--mut)} .kv .val{font-size:16px;font-weight:600;margin-top:3px}
  .up{color:var(--up)} .down{color:var(--down)} .mut{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:8px 5px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;font-size:11px}
  th:first-child,td:first-child{text-align:left}
  .name{font-weight:600}.code{color:var(--mut);font-size:11px}
  .tag{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--card2);color:var(--mut);margin-left:4px;white-space:nowrap}
  .tag.alpha{background:rgba(212,169,66,.16);color:var(--gold)}
  .bar-row{margin-bottom:10px}
  .bar-row .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .bar{height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:4px}
  .quad4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .quad4 .q{background:var(--card2);border-radius:10px;padding:12px}
  .quad4 .q .qn{font-size:13px;font-weight:600}
  .quad4 .q .qa{font-size:11px;color:var(--mut);margin:2px 0 6px}
  .quad4 .q .qf{font-size:12px;color:var(--accent)}
  .quad4 .q .qv{font-size:20px;font-weight:700;margin-top:6px}
  .pipe{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch}
  .pipe .p{flex:1;min-width:120px;background:var(--card2);border-radius:10px;padding:10px 12px;position:relative}
  .pipe .p .pn{font-weight:700;font-size:14px;color:var(--accent)}
  .pipe .p .pd{font-size:11px;color:var(--mut);margin-top:3px}
  .pipe .arrow{display:flex;align-items:center;color:var(--mut);font-size:18px}
  @media(max-width:720px){.pipe .arrow{display:none}.pipe .p{min-width:100%}}
  .rr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .rr:last-child{border-bottom:none}
  .ev{font-size:12px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--mut)}
  .ev b{color:var(--txt)} .ev:last-child{border-bottom:none}
  .lead{font-size:14px;color:var(--txt);line-height:1.7}
  .foot{text-align:center;color:var(--mut);font-size:11px;margin-top:30px}
  #err{display:none;background:rgba(239,83,80,.12);border:1px solid var(--down);color:var(--down);
    padding:14px;border-radius:10px;font-size:13px;margin-top:14px}
  .chartbox{position:relative;height:280px}
  @media(max-width:720px){.chartbox{height:220px}.big{font-size:32px}}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <div style="font-size:34px">🔒</div>
  <div style="color:#8b97a8;font-size:14px">请输入访问密码</div>
  <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••"
    style="font-size:20px;padding:12px 16px;border-radius:10px;border:1px solid #2a3340;background:#161b24;color:#e6e9ef;text-align:center;width:200px;letter-spacing:6px;outline:none">
  <button id="pwbtn" style="font-size:15px;padding:11px 30px;border-radius:10px;border:none;background:#5b8cff;color:#fff;font-weight:600;cursor:pointer">进入</button>
  <div id="pwerr" style="color:#ef5350;font-size:13px;height:18px"></div>
  <div style="color:#3a4452;font-size:11px;margin-top:8px">纸面模拟 · 无真实资金</div>
</div>

<div class="wrap">
  <header class="top">
    <h1>📊 资管系统 · 全景仪表盘 <span id="regime" class="pill"></span> <span class="pill paper">纸面模拟</span></h1>
    <p class="sub" id="meta">加载中…</p>
  </header>
  <div id="err"></div>

  <div id="app" style="display:none">

    <!-- ============ 第一部分：系统是什么 ============ -->
    <div class="section-label">系统是什么 · 设计与架构</div>

    <div class="card">
      <h2>投资理念</h2>
      <div class="lead" id="philo"></div>
      <div class="quad4" id="quads" style="margin-top:14px"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>系统怎么运转（每日自动流水线）</h2>
      <div class="pipe" id="pipe"></div>
    </div>

    <div class="grid g2" style="margin-top:14px">
      <div class="card">
        <h2>风控硬规则</h2>
        <div id="riskrules"></div>
      </div>
      <div class="card">
        <h2>资金安排</h2>
        <div id="capital"></div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>标的池设计（<span id="uvcount"></span> 只 ETF · 覆盖四象限）</h2>
      <table>
        <thead><tr><th>标的</th><th style="text-align:left">象限覆盖</th><th>底仓权重</th><th>角色</th></tr></thead>
        <tbody id="universe"></tbody>
      </table>
    </div>

    <!-- ============ 第二部分：跑成什么样 ============ -->
    <div class="section-label">跑成什么样 · 当前运行结果</div>

    <div class="grid g2">
      <div class="card">
        <h2>总净值</h2>
        <div class="row">
          <div class="big" id="nav">—</div>
          <div style="text-align:right">
            <div id="dailyChg" style="font-size:18px;font-weight:700">—</div>
            <div class="mut" style="font-size:12px">今日</div>
          </div>
        </div>
        <div class="kv">
          <div class="item"><div class="lbl">累计收益</div><div class="val" id="cum">—</div></div>
          <div class="item"><div class="lbl">初始本金</div><div class="val" id="init">—</div></div>
          <div class="item"><div class="lbl">现金 / 占比</div><div class="val" id="cash">—</div></div>
          <div class="item"><div class="lbl">持仓市值</div><div class="val" id="mv">—</div></div>
        </div>
      </div>
      <div class="card">
        <h2>净值曲线</h2>
        <div class="chartbox"><canvas id="navChart"></canvas></div>
      </div>
    </div>

    <div class="grid g2" style="margin-top:14px">
      <div class="card"><h2>风险状态</h2><div id="risk"></div></div>
      <div class="card"><h2>大类暴露</h2><div id="cat"></div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>四象限实际暴露</h2>
      <div class="quad4" id="quadexp"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>持仓明细</h2>
      <table>
        <thead><tr><th>标的</th><th>市值</th><th>权重</th><th>浮盈%</th></tr></thead>
        <tbody id="hold"></tbody>
      </table>
    </div>

    <div class="grid g2" style="margin-top:14px">
      <div class="card"><h2>最新决策推理</h2><div id="decision"></div></div>
      <div class="card"><h2>近期事件</h2><div id="events"></div></div>
    </div>

    <div class="foot" id="foot"></div>
  </div>
</div>

<script>
const fmtMoney=n=>"¥"+Number(n).toLocaleString("zh-CN",{maximumFractionDigits:0});
const fmtPct=n=>(n>=0?"+":"")+Number(n).toFixed(2)+"%";
const cls=n=>n>0?"up":(n<0?"down":"mut");

function render(d){
  const h=d.header, a=d.architecture||{};
  document.getElementById("meta").textContent="数据日期 "+h.latest_date+" · 生成于 "+(d.generated_at||"").replace("T"," ");
  const rg=(d.recent_decisions&&d.recent_decisions[0]&&d.recent_decisions[0].regime_label)||"";
  const rgEl=document.getElementById("regime");
  if(rg){rgEl.textContent="市况:"+rg;rgEl.className="pill ok";}else{rgEl.style.display="none";}

  // ---- 架构层 ----
  if(a.philosophy){
    document.getElementById("philo").innerHTML="<b>"+a.philosophy.title+"</b><br>"+a.philosophy.summary;
    document.getElementById("quads").innerHTML=a.philosophy.quadrants.map(q=>
      `<div class="q"><div class="qn">${q.name}</div><div class="qa">${q.alias}</div><div class="qf">利好：${q.favor}</div></div>`).join("");
  }
  if(a.pipeline){
    const parts=[];
    a.pipeline.forEach((p,i)=>{
      parts.push(`<div class="p"><div class="pn">${i+1}. ${p.step}</div><div class="pd">${p.desc}</div></div>`);
      if(i<a.pipeline.length-1) parts.push(`<div class="arrow">→</div>`);
    });
    document.getElementById("pipe").innerHTML=parts.join("");
  }
  if(a.risk_rules){
    document.getElementById("riskrules").innerHTML=a.risk_rules.map(r=>
      `<div class="rr"><span>${r.rule}</span><b>${r.value}</b></div>`).join("");
  }
  if(a.capital){
    const c=a.capital;
    document.getElementById("capital").innerHTML=
      `<div class="kv" style="margin-top:0">
        <div class="item"><div class="lbl">总资金</div><div class="val">${fmtMoney(c.total)}</div></div>
        <div class="item"><div class="lbl">纸面 / 实盘</div><div class="val">${fmtMoney(c.paper)} / ${fmtMoney(c.live)}</div></div>
      </div><div class="mut" style="font-size:12px;margin-top:10px">${c.note}</div>`;
  }
  if(a.universe){
    document.getElementById("uvcount").textContent=a.universe.length;
    document.getElementById("universe").innerHTML=a.universe.map(u=>
      `<tr><td><div class="name">${u.name}</div><div class="code">${u.code} · ${u.notes}</div></td>
        <td style="text-align:left;font-size:11px">${u.quadrants.map(q=>`<span class="tag">${q}</span>`).join(" ")}</td>
        <td>${u.all_weather_weight>0?u.all_weather_weight+"%":"—"}</td>
        <td>${u.alpha_pool?'<span class="tag alpha">Alpha池</span>':'<span class="tag">底仓</span>'}</td></tr>`).join("");
  }

  // ---- 结果层 ----
  document.getElementById("nav").textContent=fmtMoney(h.total_nav);
  const dc=document.getElementById("dailyChg");
  dc.textContent=fmtMoney(h.daily_pnl)+" ("+fmtPct(h.daily_return_pct)+")"; dc.className=cls(h.daily_pnl);
  const cum=document.getElementById("cum"); cum.textContent=fmtPct(h.cum_return_pct); cum.className="val "+cls(h.cum_return_pct);
  document.getElementById("init").textContent=fmtMoney(h.init_capital);
  document.getElementById("cash").textContent=fmtMoney(h.cash)+" / "+h.cash_pct+"%";
  document.getElementById("mv").textContent=fmtMoney(h.market_value);

  // nav chart
  const nh=d.nav_history||[];
  new Chart(document.getElementById("navChart"),{
    type:"line",
    data:{labels:nh.map(x=>x.date.slice(5)),
      datasets:[{data:nh.map(x=>x.total_nav),borderColor:"#5b8cff",backgroundColor:"rgba(91,140,255,.12)",
        fill:true,tension:.25,pointRadius:2,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:"#8b97a8",font:{size:10}},grid:{display:false}},
        y:{ticks:{color:"#8b97a8",font:{size:10},callback:v=>(v/10000).toFixed(1)+"万"},grid:{color:"#2a3340"}}}}
  });

  // risk
  const r=d.risk_status||{}; const rl=[];
  const ddOk=r.drawdown_pct>-r.drawdown_soft_limit;
  rl.push(riskRow("回撤",r.drawdown_pct+"%","软线 -"+r.drawdown_soft_limit+"% / 硬线 -"+r.drawdown_hard_limit+"%",ddOk));
  rl.push(riskRow("最大单仓",r.max_position_pct+"%","上限 "+r.max_position_limit+"%",r.max_position_pct<=r.max_position_limit));
  rl.push(riskRow("现金缓冲",r.cash_buffer_pct+"%","下限 "+r.cash_buffer_limit+"%",r.cash_buffer_pct>=r.cash_buffer_limit));
  const warns=(r.warnings&&r.warnings.length)?("<div class='ev' style='color:var(--warn)'>⚠ "+r.warnings.join("；")+"</div>"):"";
  document.getElementById("risk").innerHTML=rl.join("")+warns;

  // category
  const cat=d.category_exposure||{}; const maxc=Math.max(...Object.values(cat),1);
  document.getElementById("cat").innerHTML=Object.entries(cat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="bar-row"><div class="t"><span>${k}</span><span>${v}%</span></div><div class="bar"><i style="width:${(v/maxc*100).toFixed(0)}%"></i></div></div>`).join("");

  // quadrant actual exposure
  const QN={growth_up_inflation_down:"增长↑通胀↓",growth_up_inflation_up:"增长↑通胀↑",growth_down_inflation_down:"增长↓通胀↓",growth_down_inflation_up:"增长↓通胀↑"};
  const q=d.quadrant_exposure||{};
  document.getElementById("quadexp").innerHTML=Object.entries(q).map(([k,v])=>
    `<div class="q"><div class="qn">${QN[k]||k}</div><div class="qv">${v}%</div></div>`).join("");

  // holdings
  document.getElementById("hold").innerHTML=(d.holdings||[]).slice().sort((a,b)=>b.market_value-a.market_value).map(x=>{
    const w=(x.market_value/h.total_nav*100).toFixed(1);
    return `<tr><td><div class="name">${x.name}</div><div class="code">${x.code}</div></td>
      <td>${fmtMoney(x.market_value)}</td><td>${w}%</td><td class="${cls(x.unrealized_pnl_pct)}">${fmtPct(x.unrealized_pnl_pct)}</td></tr>`;}).join("");

  // decision
  const dec=(d.recent_decisions&&d.recent_decisions[0])||null;
  if(dec){
    document.getElementById("decision").innerHTML=
      `<div class="kv" style="margin-top:0">
        <div class="item"><div class="lbl">市况判断</div><div class="val">${dec.regime_label||"—"}</div></div>
        <div class="item"><div class="lbl">当日订单</div><div class="val">${dec.orders_count||0} 笔（成交 ${dec.filled_count||0}）</div></div>
        <div class="item"><div class="lbl">股票均涨</div><div class="val ${cls(dec.avg_stock_pct)}">${fmtPct(dec.avg_stock_pct||0)}</div></div>
        <div class="item"><div class="lbl">黄金均涨</div><div class="val ${cls(dec.avg_gold_pct)}">${fmtPct(dec.avg_gold_pct||0)}</div></div>
      </div>`+((dec.layer_notes&&dec.layer_notes.length)?`<div class="mut" style="font-size:12px;margin-top:10px">${dec.layer_notes.join("；")}</div>`:"");
  } else document.getElementById("decision").innerHTML="<div class='ev'>暂无</div>";

  // events
  const ev=(d.recent_events||[]).slice(0,12);
  document.getElementById("events").innerHTML=ev.length?ev.map(e=>{
    const t=(e.ts||"").slice(0,10);
    return `<div class="ev"><b>${e.name||e.code}</b> · ${e.event_type} <span style="float:right">${t}</span></div>`;}).join(""):"<div class='ev'>暂无</div>";

  document.getElementById("foot").textContent="桥水风格自适应资管系统 · 纸面模拟无真实资金 · 数据每个交易日 15:35 自动更新";
  document.getElementById("app").style.display="block";
}
function riskRow(label,val,note,ok){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)">
    <span>${label} <span class="pill ${ok?'ok':'warn'}">${ok?'正常':'注意'}</span></span>
    <span style="text-align:right"><b>${val}</b><br><span class="mut" style="font-size:11px">${note}</span></span></div>`;
}
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function pbkdf2Master(pw,salt,iter){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},km,512);
  return new Uint8Array(bits);
}
async function hmacKey(raw){return crypto.subtle.importKey("raw",raw,{name:"HMAC",hash:"SHA-256"},false,["sign"]);}
function u32be(i){const a=new Uint8Array(4);a[0]=(i>>>24)&255;a[1]=(i>>>16)&255;a[2]=(i>>>8)&255;a[3]=i&255;return a;}
function cat2(a,b){const c=new Uint8Array(a.length+b.length);c.set(a,0);c.set(b,a.length);return c;}
async function decryptEnvelope(pw,env){
  const salt=b64d(env.salt),iv=b64d(env.iv),ct=b64d(env.ct),tag=b64d(env.tag);
  const master=await pbkdf2Master(pw,salt,env.iter);
  const encKey=master.slice(0,32),macKey=master.slice(32,64);
  const mk=await hmacKey(macKey);
  const calc=new Uint8Array(await crypto.subtle.sign("HMAC",mk,cat2(iv,ct)));
  let diff=tag.length===calc.length?0:1; for(let i=0;i<tag.length;i++) diff|=calc[i]^tag[i];
  if(diff!==0) throw new Error("BADPW");
  const ek=await hmacKey(encKey);
  const out=new Uint8Array(ct.length), nb=Math.ceil(ct.length/32);
  for(let i=0;i<nb;i++){
    const blk=new Uint8Array(await crypto.subtle.sign("HMAC",ek,cat2(iv,u32be(i))));
    const s=i*32; for(let j=0;j<32&&s+j<ct.length;j++) out[s+j]=ct[s+j]^blk[j];
  }
  return JSON.parse(new TextDecoder().decode(out));
}
function showErr(msg){document.getElementById("meta").style.display="none";const el=document.getElementById("err");el.style.display="block";el.textContent=msg;}
async function boot(){
  let ENV=null;
  try{ ENV=await fetch("dashboard.json?t="+Date.now()).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}); }
  catch(e){ document.getElementById("gate").style.display="none"; showErr("无法加载数据：dashboard.json 还没推送，或当天系统未运行。("+e.message+")"); return; }
  if(!ENV || ENV.enc!=="zgenc1"){ document.getElementById("gate").style.display="none"; render(ENV); return; }
  const gate=document.getElementById("gate"); gate.style.display="flex";
  const pwEl=document.getElementById("pw"), errEl=document.getElementById("pwerr"), btn=document.getElementById("pwbtn");
  pwEl.focus();
  async function unlock(){
    errEl.textContent=""; btn.disabled=true; btn.textContent="解密中…";
    try{ const d=await decryptEnvelope(pwEl.value, ENV); gate.style.display="none"; render(d); }
    catch(e){ btn.disabled=false; btn.textContent="进入"; errEl.textContent = e.message==="BADPW" ? "密码错误，请重试" : ("出错："+e.message); pwEl.select(); }
  }
  btn.addEventListener("click",unlock);
  pwEl.addEventListener("keydown",e=>{ if(e.key==="Enter") unlock(); });
}
boot();

</script>
</body>
</html>
